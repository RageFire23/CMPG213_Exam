<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMPG 213: Exam Prep Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #131F24;
            color: #FFFFFF;
        }

        /* Animations */
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .shake { animation: shake 0.4s ease-in-out; }
        .pulse-glow { animation: pulseGlow 2s infinite; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(88, 204, 2, 0.4); }
            70% { box-shadow: 0 0 15px 5px rgba(88, 204, 2, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 204, 2, 0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #131F24; }
        ::-webkit-scrollbar-thumb { background: #37464F; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #58CC02; }

        .btn-primary {
            background-color: #58CC02;
            border-bottom: 4px solid #46A302;
            transition: all 0.1s;
            color: #131F24;
        }
        .btn-primary:active {
            transform: translateY(4px);
            border-bottom: 0px solid #46A302;
            margin-bottom: 4px;
        }
        
        .btn-secondary {
            background-color: #37464F;
            border-bottom: 4px solid #202F36;
            transition: all 0.1s;
            color: white;
        }
        .btn-secondary:active {
            transform: translateY(4px);
            border-bottom: 0px solid #202F36;
            margin-bottom: 4px;
        }

        .glass-panel {
            background: rgba(32, 47, 54, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #37464F;
        }

        /* Roadmap Styles */
        .roadmap-node {
            position: relative;
            z-index: 10;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .roadmap-node:hover {
            transform: scale(1.1);
        }
        .node-locked { opacity: 0.5; filter: grayscale(100%); cursor: not-allowed; }
        .node-locked:hover { transform: none; }
        
        .roadmap-line {
            position: absolute;
            left: 50%;
            top: 40px;
            bottom: -40px;
            width: 4px;
            background-color: #37464F;
            z-index: 0;
            transform: translateX(-50%);
        }
        .line-active { background-color: #58CC02; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-[#202F36] border-b-2 border-[#37464F] z-20 shadow-md">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showRoadmap()">
            <i class="fas fa-map-signs text-2xl text-[#CE82FF]"></i>
            <h1 class="text-xl font-black tracking-wider text-white hover:text-[#CE82FF] transition-colors">CMPG213 ROADMAP</h1>
        </div>
        <div class="flex gap-4">
            <div class="flex items-center gap-2 font-bold text-lg sm:text-xl text-[#FF9600]">
                <i class="fas fa-fire"></i><span id="streak-counter">0</span>
            </div>
            <div class="flex items-center gap-2 font-bold text-lg sm:text-xl text-[#1CB0F6]">
                <i class="fas fa-gem"></i><span id="xp-counter">0 XP</span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto relative p-4 sm:p-8" id="main-content">
        <!-- Roadmap View (Default) -->
        <div id="roadmap-view" class="max-w-2xl mx-auto py-8 pop-in">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-white">Your Path to Passing</h2>
                <p class="text-gray-400 font-bold mt-2">Follow the curriculum as outlined in the 2026 Demarcation.</p>
            </div>
            
            <div class="flex flex-col items-center gap-16" id="roadmap-container">
                <!-- Nodes generated by JS -->
            </div>
        </div>

        <!-- Study/Test View (Hidden initially) -->
        <div id="lesson-view" class="hidden max-w-4xl mx-auto flex-col gap-6 pop-in pb-20">
            <!-- Back to Roadmap -->
            <button onclick="showRoadmap()" class="text-gray-400 hover:text-white font-bold self-start flex items-center gap-2 mb-2">
                <i class="fas fa-arrow-left"></i> Back to Roadmap
            </button>

            <!-- Title Area -->
            <div class="flex items-center gap-4 mb-4 border-b-2 border-[#37464F] pb-4">
                <div id="lesson-icon" class="text-4xl p-3 rounded-xl bg-[#37464F]"></div>
                <div>
                    <div id="lesson-unit" class="text-sm font-black text-gray-400 uppercase tracking-widest"></div>
                    <h2 id="lesson-title" class="text-3xl font-black text-white"></h2>
                </div>
            </div>

            <!-- Content Area (Theory) -->
            <div id="lesson-content" class="glass-panel rounded-2xl p-6 text-lg leading-relaxed text-gray-200">
                <!-- Injected via JS -->
            </div>

            <!-- Quiz Section -->
            <div id="quiz-section" class="mt-8 border-t-2 border-[#37464F] pt-8">
                <h3 class="text-2xl font-black text-white mb-6"><i class="fas fa-dumbbell text-[#FF9600] mr-2"></i>Knowledge Check</h3>
                
                <div class="glass-panel rounded-2xl p-6 sm:p-8 shadow-xl relative" id="question-card">
                    <h4 class="text-xl sm:text-2xl font-bold leading-tight mb-4" id="question-text">Loading question...</h4>
                    
                    <button onclick="toggleHint()" class="text-[#1CB0F6] font-bold text-sm flex items-center gap-1 hover:text-white transition-colors mb-4">
                        <i class="fas fa-lightbulb"></i> Need a hint?
                    </button>
                    <div id="hint-text" class="hidden bg-[#131F24] border border-[#1CB0F6] p-4 rounded-xl text-sm mb-6 text-gray-300"></div>

                    <textarea id="answer-input" rows="4" 
                        class="w-full bg-[#131F24] border-2 border-[#37464F] rounded-xl p-4 text-white text-lg focus:outline-none focus:border-[#1CB0F6] transition-colors resize-none mb-4"
                        placeholder="Type your answer here..."></textarea>

                    <button id="submit-btn" onclick="processAnswer()" class="btn-primary w-full py-4 rounded-xl text-xl font-black uppercase tracking-wide pulse-glow">
                        Check Answer
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Feedback Modal -->
    <div id="feedback-modal" class="fixed bottom-0 left-0 w-full p-6 transition-transform transform translate-y-full duration-300 z-50">
        <div id="feedback-content" class="max-w-3xl mx-auto rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-t-4 shadow-2xl">
            <div class="flex items-center gap-4 w-full">
                <div id="feedback-icon" class="text-4xl bg-white rounded-full w-12 h-12 flex items-center justify-center shrink-0"></div>
                <div class="flex-1">
                    <h3 id="feedback-title" class="text-2xl font-black mb-1">Correct!</h3>
                    <p id="feedback-explanation" class="text-lg opacity-90"></p>
                </div>
            </div>
            <button id="next-btn" onclick="handleFeedbackContinue()" class="w-full sm:w-auto py-3 px-8 rounded-xl text-lg font-black uppercase tracking-wide bg-white transition-transform hover:scale-105 shrink-0 mt-4 sm:mt-0 text-[#131F24]">
                Continue
            </button>
        </div>
    </div>

    <script>
        // Full Curriculum based on the 2026 Demarcation
        const curriculum = [
            {
                id: "u1-u2",
                unit: "Study Units 1 & 2",
                title: "Stakeholders & Frameworks",
                icon: '<i class="fas fa-users text-[#1CB0F6]"></i>',
                color: "#1CB0F6",
                content: `
                    <div class="space-y-4">
                        <p><strong>System Stakeholders:</strong> The key players in any IS project.</p>
                        <ul class="list-disc pl-6 space-y-2">
                            <li><strong>System Owners:</strong> Pay for the system. Care about cost vs. benefit.</li>
                            <li><strong>System Users:</strong> Use the system daily. Define the business requirements.</li>
                            <li><strong>System Designers:</strong> Translate business requirements into technical solutions.</li>
                            <li><strong>System Builders:</strong> Construct the actual system (programmers/database admins).</li>
                            <li><strong>System Analysts:</strong> The bridge between users and the technical team.</li>
                        </ul>
                        <p class="mt-4"><strong>Zachman Framework:</strong> Focuses on Data (What), Process (How), and Network/Communication (Where) from the perspectives of different stakeholders.</p>
                        <p class="mt-4 text-[#FF9600] font-bold"><i class="fas fa-exclamation-triangle"></i> Exam Focus: Distinguish between front-office (customer facing) and back-office (internal operations) systems.</p>
                    </div>
                `,
                question: "According to the stakeholder roles, who is primarily responsible for defining the business requirements, and who is responsible for paying for the system?",
                hint: "Think about who uses it daily versus who holds the wallet.",
                keywords: ["user", "owner", "users", "owners"],
                minMatches: 2,
                explanation: "System Users define the business requirements because they use it daily. System Owners pay for the system and focus on costs and benefits."
            },
            {
                id: "u3-u4",
                unit: "Study Units 3 & 4",
                title: "Development & Management",
                icon: '<i class="fas fa-tasks text-[#CE82FF]"></i>',
                color: "#CE82FF",
                content: `
                    <div class="space-y-4">
                        <p><strong>PIECES Framework:</strong> Used to categorize problems, opportunities, and directives.</p>
                        <ul class="list-disc pl-6 space-y-1">
                            <li><strong>P</strong>erformance</li>
                            <li><strong>I</strong>nformation</li>
                            <li><strong>E</strong>conomics</li>
                            <li><strong>C</strong>ontrol</li>
                            <li><strong>E</strong>fficiency</li>
                            <li><strong>S</strong>ervice</li>
                        </ul>
                        <p class="mt-4"><strong>Approaches:</strong> Know the difference between Agile (iterative, flexible) and Traditional/Waterfall (sequential, rigid) approaches.</p>
                        <p class="mt-4 text-[#FF9600] font-bold"><i class="fas fa-exclamation-triangle"></i> Exam Focus: Understand Scope Creep (uncontrolled changes in requirements) and Feature Creep (uncontrolled addition of technical features) as causes for project failure.</p>
                    </div>
                `,
                question: "Name the framework used to categorize problems and opportunities, and list at least three of what its acronym stands for.",
                hint: "P.I.E.C.E.S.",
                keywords: ["pieces", "performance", "information", "economics", "control", "efficiency", "service"],
                minMatches: 4, // "pieces" + 3 others
                explanation: "The PIECES framework stands for Performance, Information, Economics, Control, Efficiency, and Service."
            },
            {
                id: "u5-u7",
                unit: "Study Units 5, 6, 7",
                title: "Analysis & Requirements",
                icon: '<i class="fas fa-search text-[#FF9600]"></i>',
                color: "#FF9600",
                content: `
                    <div class="space-y-4">
                        <p><strong>Requirements Analysis Phase:</strong> This is considered the most important phase. Studies show 50% or more requirements change before a system is in production. Incorrect requirements lead to high costs and system failure.</p>
                        <ul class="list-disc pl-6 space-y-2 mt-2">
                            <li><strong>Functional Requirements:</strong> What the system MUST DO (activities, inputs, outputs). Example: "The system must generate a monthly report."</li>
                            <li><strong>Non-Functional Requirements:</strong> Qualities the system must HAVE (speed, security, performance). Example: "The system must load in under 2 seconds."</li>
                        </ul>
                        <p class="mt-4"><strong>Use-Case Modeling (Unit 7):</strong> Identifies system boundaries.</p>
                        <ul class="list-disc pl-6 space-y-1">
                            <li><strong>Actor:</strong> Stick figure outside the system block. Represents a user or external system.</li>
                            <li><strong>Use Case:</strong> An oval inside the block starting with a verb (e.g., "Place Order").</li>
                            <li><strong><< depends on >>:</strong> An arrow pointing to a use case that MUST happen first (e.g., "Make Deposit" depends on "Create Account").</li>
                        </ul>
                    </div>
                `,
                question: "Explain the difference between a Functional and a Non-Functional requirement, and give a brief example of each.",
                hint: "What it DOES versus HOW it behaves/qualities it has.",
                keywords: ["functional", "do", "activities", "non-functional", "nonfunctional", "qualities", "characteristics", "speed", "security"],
                minMatches: 4,
                explanation: "Functional requirements state what the system must DO (e.g., process a payment). Non-functional requirements state QUALITIES the system must possess (e.g., it must be secure or fast)."
            },
            {
                id: "u8",
                unit: "Study Unit 8",
                title: "Data Modeling (ERDs)",
                icon: '<i class="fas fa-database text-[#58CC02]"></i>',
                color: "#58CC02",
                content: `
                    <div class="space-y-4">
                        <p class="text-xl font-black text-[#58CC02]">HEAVY MARKS: Guaranteed Exam Question</p>
                        <p>You must know how to draw an Entity Relationship Diagram (ERD) and apply normalization up to 3NF based on a scenario.</p>
                        <ul class="list-disc pl-6 space-y-2">
                            <li><strong>Entity:</strong> A noun (table). Drawn as a rectangle.</li>
                            <li><strong>Primary Key (PK):</strong> Unique identifier.</li>
                            <li><strong>Foreign Key (FK):</strong> A PK placed in another table to link them.</li>
                        </ul>
                        <div class="bg-[#202F36] p-4 rounded-xl border border-[#58CC02] mt-4">
                            <h4 class="font-bold text-white mb-2">The Golden Rule of 3NF</h4>
                            <p>You <strong>CANNOT</strong> have a Many-to-Many relationship in a 3NF data model. You must break it by creating an <strong>Associative Entity</strong> (bridge table) in between them. The PK of this associative entity is usually a composite of the FKs from the original two entities.</p>
                        </div>
                    </div>
                `,
                question: "In an ERD, if a 'Student' can have many 'Tutors', and a 'Tutor' can have many 'Students', what must you do to normalize this to 3NF?",
                hint: "You cannot link them directly. You need a third table.",
                keywords: ["associative", "bridge", "intersection", "new entity", "foreign", "primary", "composite", "break", "resolve"],
                minMatches: 2,
                explanation: "You must resolve the Many-to-Many relationship by creating a new Associative Entity (bridge table) between Student and Tutor. Its primary key is usually made up of the foreign keys of the two original entities."
            },
            {
                id: "u9",
                unit: "Study Unit 9",
                title: "Process Modeling (DFDs)",
                icon: '<i class="fas fa-project-diagram text-[#1CB0F6]"></i>',
                color: "#1CB0F6",
                content: `
                    <div class="space-y-4">
                        <p class="text-xl font-black text-[#1CB0F6]">HEAVY MARKS: Practical Drawing</p>
                        <p>You must draw a Data Flow Diagram (DFD) from a scenario. Memorize these specific shapes and rules:</p>
                        <div class="grid grid-cols-2 gap-4 text-center mt-4 mb-4">
                            <div class="p-4 bg-[#202F36] rounded-xl border border-[#37464F]">
                                <strong class="block text-white mb-2">External Agent</strong>
                                <span class="text-sm text-gray-400">Square. Represents an outside person/system sending or receiving data.</span>
                            </div>
                            <div class="p-4 bg-[#202F36] rounded-xl border border-[#37464F]">
                                <strong class="block text-white mb-2">Process</strong>
                                <span class="text-sm text-gray-400">Rounded Rectangle. Always starts with a verb (e.g., "Verify Payment").</span>
                            </div>
                            <div class="p-4 bg-[#202F36] rounded-xl border border-[#37464F]">
                                <strong class="block text-white mb-2">Data Store</strong>
                                <span class="text-sm text-gray-400">Open Rectangle (lines on top/bottom/left). Usually named as a plural noun (e.g., "Students").</span>
                            </div>
                            <div class="p-4 bg-[#202F36] rounded-xl border border-[#37464F]">
                                <strong class="block text-white mb-2">Data Flow</strong>
                                <span class="text-sm text-gray-400">Arrow. Must be named with a noun indicating what data is moving.</span>
                            </div>
                        </div>
                        <p class="text-[#FF9600] font-bold"><i class="fas fa-exclamation-triangle"></i> Difference from Flowcharts: DFDs do NOT show timing, sequence, logic, or decisions/loops. They only show where data moves.</p>
                    </div>
                `,
                question: "What is the fundamental difference between a Data Flow Diagram (DFD) and a Flowchart? Mention what shape is used for a Process in a DFD.",
                hint: "Think about time/sequence versus data movement. Also, what shape is a process?",
                keywords: ["time", "sequence", "logic", "flowchart", "data", "move", "rounded", "rectangle"],
                minMatches: 3,
                explanation: "A Flowchart shows logic, sequence, and time. A DFD only shows data movement. In a DFD, a process is drawn as a rounded rectangle."
            },
            {
                id: "u10",
                unit: "Study Unit 10",
                title: "Feasibility & Financials",
                icon: '<i class="fas fa-calculator text-[#FFC800]"></i>',
                color: "#FFC800",
                content: `
                    <div class="space-y-4">
                        <p class="text-xl font-black text-[#FFC800]">BRING A CALCULATOR: Formulas Required</p>
                        <p><strong>The 6 Feasibility Tests:</strong> Operational, Cultural/Political, Technical, Schedule, Economic, Legal. Know these.</p>
                        <p class="mt-4"><strong>Financial Concepts:</strong></p>
                        <ul class="list-disc pl-6 space-y-2">
                            <li><strong>Time Value of Money:</strong> Money today is worth MORE than money in the future due to inflation or earning capacity.</li>
                            <li><strong>Discount Factors:</strong> We multiply future costs/benefits by a discount factor to find their "Present Value".</li>
                            <li><strong>NPV (Net Present Value):</strong> The sum of all time-adjusted benefits minus the sum of all time-adjusted costs. If NPV is positive, the project is a good investment.</li>
                            <li><strong>Payback Analysis:</strong> Determining how many years it takes for the cumulative benefits to exceed the cumulative costs.</li>
                        </ul>
                        <p class="mt-4 text-[#FF9600] font-bold"><i class="fas fa-exclamation-triangle"></i> Exam Focus: Practice calculating cumulative lifetime time-adjusted costs and benefits (like the table in the 2024 memo).</p>
                    </div>
                `,
                question: "Name THREE of the six feasibility tests. Also, briefly explain why an analyst calculates the Net Present Value (NPV).",
                hint: "OP, TECH, ECO... and what does a positive NPV mean?",
                keywords: ["operational", "technical", "economic", "schedule", "cultural", "political", "legal", "benefits", "costs", "positive", "investment"],
                minMatches: 4,
                explanation: "Feasibility tests include Operational, Technical, Economic, Schedule, Cultural, Legal. NPV is calculated to see if total benefits outweigh total costs over time; a positive NPV indicates a worthwhile investment."
            }
        ];

        // App State
        let xp = 0;
        let streak = 0;
        let currentLessonIndex = -1;
        let answeredCorrectly = false;
        
        // Load progress from local memory (simulation)
        let unlockedNodes = [0]; // Index 0 is unlocked by default

        // DOM Elements
        const ui = {
            roadmapView: document.getElementById('roadmap-view'),
            lessonView: document.getElementById('lesson-view'),
            roadmapContainer: document.getElementById('roadmap-container'),
            
            lessonUnit: document.getElementById('lesson-unit'),
            lessonTitle: document.getElementById('lesson-title'),
            lessonIcon: document.getElementById('lesson-icon'),
            lessonContent: document.getElementById('lesson-content'),
            
            questionText: document.getElementById('question-text'),
            answerInput: document.getElementById('answer-input'),
            hintText: document.getElementById('hint-text'),
            
            xpCounter: document.getElementById('xp-counter'),
            streakCounter: document.getElementById('streak-counter'),
            
            feedbackModal: document.getElementById('feedback-modal'),
            feedbackContent: document.getElementById('feedback-content'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackTitle: document.getElementById('feedback-title'),
            feedbackExplanation: document.getElementById('feedback-explanation'),
            nextBtn: document.getElementById('next-btn')
        };

        function renderRoadmap() {
            ui.roadmapContainer.innerHTML = '';
            
            curriculum.forEach((lesson, index) => {
                const isUnlocked = unlockedNodes.includes(index);
                const isCompleted = unlockedNodes.includes(index + 1);
                
                // Create Node Container
                const nodeContainer = document.createElement('div');
                nodeContainer.className = 'relative w-full flex justify-center';
                
                // Create Line (if not last)
                if (index < curriculum.length - 1) {
                    const line = document.createElement('div');
                    line.className = `roadmap-line ${isCompleted ? 'line-active' : ''}`;
                    nodeContainer.appendChild(line);
                }

                // Create Node Button
                const node = document.createElement('div');
                node.className = `roadmap-node w-20 h-20 rounded-full flex items-center justify-center text-3xl shadow-xl z-10 border-4 border-[#131F24] 
                    ${isUnlocked ? '' : 'node-locked bg-[#37464F] text-gray-500'}`;
                
                if (isUnlocked) {
                    node.style.backgroundColor = isCompleted ? '#58CC02' : lesson.color;
                    node.innerHTML = isCompleted ? '<i class="fas fa-check text-[#131F24]"></i>' : lesson.icon;
                    node.onclick = () => openLesson(index);
                } else {
                    node.innerHTML = '<i class="fas fa-lock"></i>';
                }

                // Create Label
                const labelContainer = document.createElement('div');
                labelContainer.className = `absolute top-1/2 -translate-y-1/2 w-48 ${index % 2 === 0 ? 'right-[calc(50%+3rem)] text-right' : 'left-[calc(50%+3rem)] text-left'}`;
                
                labelContainer.innerHTML = `
                    <div class="text-sm font-bold ${isUnlocked ? 'text-gray-300' : 'text-gray-600'}">${lesson.unit}</div>
                    <div class="font-black ${isUnlocked ? 'text-white' : 'text-gray-500'}">${lesson.title}</div>
                `;

                nodeContainer.appendChild(node);
                nodeContainer.appendChild(labelContainer);
                ui.roadmapContainer.appendChild(nodeContainer);
            });
        }

        function showRoadmap() {
            ui.lessonView.classList.add('hidden');
            ui.lessonView.classList.remove('flex');
            ui.roadmapView.classList.remove('hidden');
            renderRoadmap();
            window.scrollTo(0, 0);
        }

        function openLesson(index) {
            currentLessonIndex = index;
            const lesson = curriculum[index];
            
            ui.roadmapView.classList.add('hidden');
            ui.lessonView.classList.remove('hidden');
            ui.lessonView.classList.add('flex');
            
            // Populate Content
            ui.lessonUnit.innerText = lesson.unit;
            ui.lessonTitle.innerText = lesson.title;
            ui.lessonIcon.innerHTML = lesson.icon;
            ui.lessonIcon.style.color = lesson.color;
            ui.lessonContent.innerHTML = lesson.content;
            
            // Populate Quiz
            ui.questionText.innerText = lesson.question;
            ui.hintText.innerText = lesson.hint;
            ui.hintText.classList.add('hidden');
            ui.answerInput.value = '';
            answeredCorrectly = false;
            
            // Reset animations/modals
            document.getElementById('question-card').classList.remove('pop-in');
            void document.getElementById('question-card').offsetWidth;
            document.getElementById('question-card').classList.add('pop-in');
            
            ui.feedbackModal.classList.remove('translate-y-0');
            ui.feedbackModal.classList.add('translate-y-full');
            
            window.scrollTo(0, 0);
        }

        function toggleHint() {
            ui.hintText.classList.toggle('hidden');
        }

        function processAnswer() {
            if (currentLessonIndex === -1) return;
            const userText = ui.answerInput.value.toLowerCase();
            if(userText.trim() === '') return;

            const lesson = curriculum[currentLessonIndex];
            let matchCount = 0;

            lesson.keywords.forEach(kw => {
                if(userText.includes(kw.toLowerCase())) matchCount++;
            });

            const isCorrect = matchCount >= lesson.minMatches;
            showFeedback(isCorrect, lesson.explanation);
        }

        function showFeedback(isCorrect, explanation) {
            ui.feedbackExplanation.innerText = explanation;
            
            if(isCorrect) {
                ui.feedbackContent.className = "max-w-3xl mx-auto rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-t-4 shadow-2xl bg-[#D7FFB8] border-[#58CC02] text-[#46A302]";
                ui.feedbackIcon.innerHTML = '<i class="fas fa-check text-[#58CC02]"></i>';
                ui.feedbackTitle.innerText = "Nailed it!";
                ui.nextBtn.className = "w-full sm:w-auto py-3 px-8 rounded-xl text-lg font-black uppercase tracking-wide bg-[#58CC02] text-white transition-transform hover:scale-105 shadow-[0_4px_0_#46A302]";
                
                if(!answeredCorrectly) {
                    xp += 50;
                    streak += 1;
                    updateStats();
                    
                    // Unlock next node
                    if (!unlockedNodes.includes(currentLessonIndex + 1) && currentLessonIndex + 1 < curriculum.length) {
                        unlockedNodes.push(currentLessonIndex + 1);
                    }
                }
                answeredCorrectly = true;
                
            } else {
                ui.feedbackContent.className = "max-w-3xl mx-auto rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-t-4 shadow-2xl bg-[#FFDFE0] border-[#FF4B4B] text-[#EA2B2B]";
                ui.feedbackIcon.innerHTML = '<i class="fas fa-times text-[#FF4B4B]"></i>';
                ui.feedbackTitle.innerText = "Review the text above...";
                ui.nextBtn.className = "w-full sm:w-auto py-3 px-8 rounded-xl text-lg font-black uppercase tracking-wide bg-[#FF4B4B] text-white transition-transform hover:scale-105 shadow-[0_4px_0_#EA2B2B]";
                
                document.getElementById('question-card').classList.add('shake');
                setTimeout(() => document.getElementById('question-card').classList.remove('shake'), 400);

                streak = 0;
                updateStats();
                answeredCorrectly = false;
            }

            ui.feedbackModal.classList.remove('translate-y-full');
            ui.feedbackModal.classList.add('translate-y-0');
        }

        function handleFeedbackContinue() {
            ui.feedbackModal.classList.add('translate-y-full');
            ui.feedbackModal.classList.remove('translate-y-0');
            
            if (answeredCorrectly) {
                // Return to roadmap after success
                showRoadmap();
            }
        }

        function updateStats() {
            ui.xpCounter.innerText = `${xp} XP`;
            ui.streakCounter.innerText = streak;
        }

        // Init
        renderRoadmap();
    </script>
</body>
</html>
